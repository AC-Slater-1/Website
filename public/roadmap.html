const NAVY_ART = "linear-gradient(135deg,#18181b 0%,#1f1f23 50%,#18181b 100%)";
const TC = { 1: "#b8960a", 2: "#60a5fa", 3: "#f59e0b", 4: "#ef4444" };
const TC_BRIGHT = { 1: "#ffd700", 2: "#60a5fa", 3: "#f59e0b", 4: "#ef4444" };
const TBG = { 1: "rgba(255,215,0,.06)", 2: "rgba(96,165,250,.06)", 3: "rgba(245,158,11,.06)", 4: "rgba(239,68,68,.06)" };
const TBORDER = { 1: "rgba(255,215,0,.2)", 2: "rgba(96,165,250,.2)", 3: "rgba(245,158,11,.2)", 4: "rgba(239,68,68,.2)" };
const SW = { YES: "#16a34a", PARTIAL: "#f59e0b", NO: "#ef4444" };
const SWBG = { YES: "rgba(22,163,74,.06)", PARTIAL: "rgba(245,158,11,.06)", NO: "rgba(239,68,68,.06)" };
const WEIGHT_META = [
  { key: "priceResent", label: "Price Resentment", icon: "💸", color: "#dc2626",
    tip: "How angry are customers about what they pay? A $600/mo Statista subscription for public data scores 5." },

    tip: "How many people are actually paying for this category? Grammarly's 30M daily active users = massive viral surface." },

  { key: "switching", label: "Low Switch Cost", icon: "🔄", color: "#7c3aed",
    tip: "Can someone swap tonight with zero operational risk? Changing a Calendly link = 5 minutes." },
];

function getTier(s) { return s >= 4.5 ? 1 : s >= 4.0 ? 2 : s >= 3.0 ? 3 : 4; }
function fmtRev(m) { return m >= 1000 ? "$"+(m/1000).toFixed(1)+"B" : "$"+m+"M"; }

function ScoreBar({ val }) {
  const color = val >= 4 ? "#d4a800" : val >= 3 ? "#f59e0b" : "#ef4444";
  return (
    <div style={{ display: "flex", gap: 2, justifyContent: "center", alignItems: "flex-end" }}>
      {[1,2,3,4,5].map(i => {
        const filled = i <= val;
        const half = !filled && val >= (i - 0.5) && val < i;
        return (
          <div key={i} style={{ width: 5, height: 16, borderRadius: 2, overflow: "hidden", position: "relative",
            background: filled ? color : "#27272a",
          }}>
            {half && <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: "50%", background: color, borderRadius: "0 0 2px 2px" }} />}
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [weights, setWeights] = useState({ priceResent: 30, users: 25, replication: 25, switching: 20 });
  const [expanded, setExpanded] = useState(null);
  const [filterTier, setFilterTier] = useState(0);
  const [filterSwitch, setFilterSwitch] = useState("ALL");
  const [revMode, setRevMode] = useState("attackable");
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState("desc");

  const tw = weights.priceResent + weights.users + weights.replication + weights.switching;

  const scored = useMemo(() => {
    return RAW_DATA.map(d => {
      const c = tw > 0 ? (d.priceResent*weights.priceResent + d.users*weights.users + d.replication*weights.replication + d.switching*weights.switching) / tw : 0;
      const rounded = Math.round(c * 100) / 100;
      return { ...d, composite: rounded, tier: getTier(rounded) };
    }).sort((a,b) => b.composite - a.composite).map((d,i) => ({ ...d, rank: i+1 }));
  }, [weights, tw]);

  const sorted = useMemo(() => {
    if (!sortCol) return scored;
    const list = [...scored];
    list.sort((a,b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      if (va < vb) return sortDir === "asc" ? -1 : 1;
      if (va > vb) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
    return list;
  }, [scored, sortCol, sortDir]);

  const filtered = sorted.filter(d => {
    if (filterTier > 0 && d.tier !== filterTier) return false;
    if (filterSwitch !== "ALL" && d.switchTonight !== filterSwitch) return false;
    return true;
  });

  const allRev = scored.reduce((s,d) => s+d.revenue, 0);
  const attackRev = scored.filter(d => d.tier <= 2).reduce((s,d) => s+d.revenue, 0);
  const displayRev = revMode === "attackable" ? attackRev : allRev;
  const displayCount = revMode === "attackable" ? scored.filter(d => d.tier <= 2).length : scored.length;
  const tierCounts = {}; scored.forEach(d => { tierCounts[d.tier] = (tierCounts[d.tier]||0)+1; });

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("desc"); }
  };

    `linear-gradient(90deg, ${color} 0%, ${color} ${(val/max)*100}%, #27272a ${(val/max)*100}%, #27272a 100%)`;

                { label: "🔄", col: "switching", w: 52, align: "center", emoji: true },
                { label: "Score", col: "composite", w: 70, align: "center" },
              ].map(({ label, col, w, align, emoji }, i) => (
                <th key={i} onClick={() => col && handleSort(col)} style={{
                  padding: emoji ? "16px 8px" : "16px 12px",
                  color: sortCol === col ? "#fafafa" : (emoji ? "rgba(255,255,255,.9)" : "#3b82f6"),
                  fontWeight: 700, textAlign: align, fontSize: emoji ? 15 : 13, letterSpacing: .3,
                  whiteSpace: "nowrap", cursor: col ? "pointer" : "default",
                  background: sortCol === col ? "rgba(59,130,246,.12)" : "transparent",
                  borderBottom: "1px solid #27272a", width: w || undefined,
                }}>{label}{sortCol === col ? (sortDir === "desc" ? " ↓" : " ↑") : ""}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((d, idx) => {
              const tc = TC[d.tier];
              const isEx = expanded === d.name;
              return (
                <React.Fragment key={d.name}>
                  <tr onClick={() => setExpanded(isEx ? null : d.name)}
                    style={{ borderBottom: isEx ? "none" : "1px solid #27272a", cursor: "pointer",
                      background: isEx ? "#1f1f23" : idx % 2 === 0 ? "#18181b" : "#1f1f23", transition: "background .15s" }}>
                    <td style={{ padding: "12px 10px", textAlign: "center" }}>
                      <span style={{ color: tc, fontSize: 9, marginRight: 3, display: "inline-block", transform: isEx ? "rotate(90deg)" : "none", transition: "transform .15s" }}>▶</span>
                      <span style={{ fontWeight: 700, color: "#a1a1aa", fontSize: 13 }}>{d.rank}</span>
                    </td>
                    <td style={{ padding: "12px 10px", fontWeight: 700, color: "#fafafa", fontSize: 14, whiteSpace: "nowrap", letterSpacing: -.2 }}>{d.name}</td>
                    <td style={{ padding: "12px 10px", color: "#a1a1aa", fontSize: 12, fontWeight: 500 }}>{d.category}</td>
                    <td style={{ padding: "12px 10px", color: "#71717a", fontSize: 11, maxWidth: 220, lineHeight: 1.4 }}>{d.replaces}</td>
                    <td style={{ padding: "12px 10px", color: "#dc2626", fontSize: 12, whiteSpace: "nowrap", fontWeight: 600 }}>{d.price}</td>
                    <td style={{ padding: "12px 10px", textAlign: "center", fontWeight: 700, fontSize: 13, color: "#b8960a" }}>{fmtRev(d.revenue)}</td>
                    {[d.priceResent, d.users, d.replication, d.switching].map((v,i) => (
                      <td key={i} style={{ padding: "12px 4px" }}><ScoreBar val={v} /></td>
                    ))}
                    <td style={{ padding: "12px 10px", textAlign: "center" }}>
                      <span style={{ fontWeight: 900, fontSize: 18, color: tc, letterSpacing: -.5 }}>{d.composite}</span>
                    </td>
                  </tr>
                  {isEx && (
                    <tr style={{ background: "#1f1f23" }}>
                      <td colSpan={11} style={{ padding: 0 }}>
                        <div style={{ borderLeft: `3px solid ${TC_BRIGHT[d.tier]}`, padding: 24, margin: "0 10px 10px" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                            <div>
                              <span style={{ fontSize: 22, fontWeight: 800, color: "#fafafa" }}>{d.name}</span>
                              <span style={{ fontSize: 12, color: "#71717a", marginLeft: 10 }}>{d.category}</span>
                            </div>
                            <div style={{ textAlign: "right" }}>
                              <div style={{ fontSize: 36, fontWeight: 900, color: TC_BRIGHT[d.tier] }}>{d.composite}</div>
                              <div style={{ fontSize: 10, color: "#71717a", fontWeight: 600, letterSpacing: 1 }}>TIER {d.tier} · {d.switchTonight}</div>
                            </div>
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
                            {[{ label: "TAM", value: d.tam, color: "#fafafa" }, { label: "Their pricing", value: d.price, color: "#ef4444" }, { label: "Revenue displaced", value: fmtRev(d.revenue), color: "#ffd700" }].map(({ label, value, color }) => (
                              <div key={label} style={{ background: "#09090b", borderRadius: 12, padding: "12px 16px", border: "1px solid #27272a" }}>
                                <div style={{ fontSize: 10, color: "#71717a", fontWeight: 600, letterSpacing: .5, marginBottom: 2 }}>{label}</div>
                                <div style={{ fontSize: 15, fontWeight: 700, color }}>{value}</div>
                              </div>
                            ))}
                          </div>
                          <div style={{ fontSize: 13, color: "#a1a1aa", fontStyle: "italic", marginBottom: 20, lineHeight: 1.6, background: "#09090b", borderRadius: 12, padding: "14px 18px", border: "1px solid #27272a" }}>{d.note}</div>
                          <div style={{ marginBottom: 20 }}>
                            <div style={{ fontSize: 11, color: "#fafafa", fontWeight: 700, letterSpacing: .5, marginBottom: 10, textTransform: "uppercase" }}>Competitors We Replace ({d.competitors.length})</div>
                            <div style={{ borderRadius: 14, overflow: "hidden", border: "1px solid #27272a" }}>
                              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                                <thead><tr style={{ background: "#09090b" }}>
                                  {["Company","Pricing","Revenue","Team","Funding","G2","Vulnerability"].map((h,i) => (
                                    <th key={i} style={{ padding: "10px 12px", fontSize: 10, color: "#71717a", letterSpacing: .5, textAlign: "left", fontWeight: 600, borderBottom: "1px solid #27272a" }}>{h}</th>
                                  ))}
                                </tr></thead>
                                <tbody>
                                  {d.competitors.map((c, ci) => (
                                    <React.Fragment key={ci}>
                                    <tr style={{ borderBottom: c.recentNews ? "none" : "1px solid #27272a" }}>
                                      <td style={{ padding: "10px 12px", fontSize: 12, whiteSpace: "nowrap" }}>
                                        <a href={c.url} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()}
                                          style={{ color: "#fafafa", fontWeight: 600, textDecoration: "none", borderBottom: "1px solid #3f3f46" }}>{c.name} ↗</a>
                                        {c.founded && <div style={{ fontSize: 10, color: "#52525b", marginTop: 2 }}>Est. {c.founded}</div>}
                                      </td>
                                      <td style={{ padding: "10px 12px", fontSize: 11, color: "#ef4444", whiteSpace: "nowrap", fontWeight: 600 }}>{c.price}</td>
                                      <td style={{ padding: "10px 12px", fontSize: 11, whiteSpace: "nowrap" }}>
                                        <span style={{ color: "#ffd700", fontWeight: 700 }}>{c.rev}</span>
                                        {c.growth && <div style={{ fontSize: 10, color: c.growth.startsWith("↑") ? "#22c55e" : c.growth.startsWith("↓") ? "#ef4444" : "#a1a1aa", fontWeight: 600, marginTop: 2 }}>{c.growth}</div>}
                                      </td>
                                      <td style={{ padding: "10px 12px", fontSize: 11, color: "#a1a1aa", whiteSpace: "nowrap" }}>
                                        <div>{c.users}</div>
                                        {c.employees && <div style={{ fontSize: 10, color: "#52525b", marginTop: 2 }}>{c.employees} emp</div>}
                                      </td>
                                      <td style={{ padding: "10px 12px", fontSize: 10, color: "#a1a1aa", whiteSpace: "nowrap" }}>{c.funding || "—"}</td>
                                      <td style={{ padding: "10px 12px", fontSize: 11, whiteSpace: "nowrap" }}>
                                        {c.g2 ? <span style={{ color: "#f59e0b", fontWeight: 600 }}>★ {c.g2}</span> : <span style={{ color: "#3f3f46" }}>—</span>}
                                      </td>
                                      <td style={{ padding: "10px 12px", fontSize: 11, color: "#a1a1aa", lineHeight: 1.5 }}>{c.vulnerability}</td>
                                    </tr>
                                    {c.recentNews && (
                                      <tr style={{ borderBottom: "1px solid #27272a" }}>
                                        <td colSpan={7} style={{ padding: "4px 12px 10px", fontSize: 11 }}>
                                          <span style={{ color: "#3b82f6", fontWeight: 600, fontSize: 9, letterSpacing: .5, textTransform: "uppercase", marginRight: 6 }}>NEWS</span>
                                          <span style={{ color: "#71717a" }}>{c.recentNews}</span>
                                        </td>
                                      </tr>
                                    )}
                                    </React.Fragment>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
                            {WEIGHT_META.map(({ key, label, color }) => (
                              <div key={key} style={{ textAlign: "center", padding: 14, border: "1px solid #27272a", borderRadius: 14, background: "#09090b" }}>
                                <div style={{ fontSize: 10, color: "#71717a", fontWeight: 600, letterSpacing: .5, marginBottom: 6 }}>{label}</div>
                                <div style={{ fontSize: 28, fontWeight: 900, color }}>{d[key]}</div>
                                <div style={{ fontSize: 11, color: "#52525b", marginTop: 2 }}>× {weights[key]}% = {tw > 0 ? ((d[key]*weights[key])/tw).toFixed(2) : "0"}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
            {filtered.length === 0 && <tr><td colSpan={11} style={{ padding: 40, textAlign: "center", color: "#71717a" }}>No categories match current filters</td></tr>}
          </tbody>
        </table>
        </div>
      </div>


      {/* FOOTER */}
      <footer style={{ background: "#18181b", padding: "20px 16px", borderRadius: 12, marginTop: 0, border: "1px solid #27272a", textAlign: "center" }}>
        <p style={{ fontSize: 11, color: "#52525b" }}>Development Scoring Roadmap · Internal Use</p>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
