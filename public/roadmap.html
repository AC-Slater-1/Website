function getTier(s) { return s >= 4.5 ? 1 : s >= 4.0 ? 2 : s >= 3.0 ? 3 : 4; }
function fmtRev(m) { return m >= 1000 ? "$"+(m/1000).toFixed(1)+"B" : "$"+m+"M"; }

function ScoreBar({ val }) {
  return (
    <div style={{ display: "flex", gap: 2, justifyContent: "center" }}>
      {[1,2,3,4,5].map(i => (
        <div key={i} style={{ width: 5, height: 16, borderRadius: 2,
          background: i <= val ? (val >= 4 ? "#d4a800" : val >= 3 ? "#f59e0b" : "#ef4444") : "#f1f5f9",
        }} />
      ))}

      
    </div>
  );
}

  const tw = weights.priceResent + weights.users + weights.replication + weights.switching;

  const scored = useMemo(() => {
    return RAW_DATA.map(d => {
      const c = tw > 0 ? (d.priceResent*weights.priceResent + d.users*weights.users + d.replication*weights.replication + d.switching*weights.switching) / tw : 0;
      const rounded = Math.round(c * 100) / 100;
      return { ...d, composite: rounded, tier: getTier(rounded) };
    }).sort((a,b) => b.composite - a.composite).map((d,i) => ({ ...d, rank: i+1 }));
  }, [weights, tw]);

  const sorted = useMemo(() => {
    if (!sortCol) return scored;
    const list = [...scored];
    list.sort((a,b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      if (va < vb) return sortDir === "asc" ? -1 : 1;
      if (va > vb) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
    return list;
  }, [scored, sortCol, sortDir]);

              <div className="tier-rev" style={{ fontSize: 28, fontWeight: 900, color: TC[t], letterSpacing: -1 }}>{fmtRev(rev)}</div>
              <div style={{ fontSize: 12, color: "#64748b", marginTop: 6, fontWeight: 500 }}>{prods.length} categories · {allRev > 0 ? Math.round(rev/allRev*100) : 0}%</div>
              <div style={{ marginTop: 10, height: 4, background: "#f1f5f9", overflow: "hidden", borderRadius: 2 }}>
                <div style={{ height: "100%", width: `${allRev > 0 ? (rev/allRev)*100 : 0}%`, background: c, borderRadius: 2, transition: "width .3s" }} />
              </div>
              <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 8, lineHeight: 1.5 }}>{prods.map(p => p.name).join(" · ")}</div>
            </div>
          );
        })}
      </div>

      {/* FILTERS */}
      {(filterTier > 0 || filterSwitch !== "ALL" || sortCol) && (
        <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
          {filterTier > 0 && <span style={{ fontSize: 11, fontWeight: 600, color: TC_BRIGHT[filterTier], background: TBG[filterTier], padding: "4px 12px", borderRadius: 20, border: `1px solid ${TBORDER[filterTier]}` }}>Tier {filterTier} <span onClick={() => setFilterTier(0)} style={{ cursor: "pointer", marginLeft: 4 }}>✕</span></span>}
          {filterSwitch !== "ALL" && <span style={{ fontSize: 11, fontWeight: 600, color: SW[filterSwitch], background: SWBG[filterSwitch], padding: "4px 12px", borderRadius: 20 }}>{filterSwitch} <span onClick={() => setFilterSwitch("ALL")} style={{ cursor: "pointer", marginLeft: 4 }}>✕</span></span>}
          {sortCol && <span onClick={() => { setSortCol(null); setSortDir("desc"); }} style={{ fontSize: 11, fontWeight: 600, color: "#dc2626", background: "#fef2f2", padding: "4px 12px", borderRadius: 20, border: "1px solid #fecaca", cursor: "pointer" }}>✕ Clear Sort</span>}
          <span style={{ fontSize: 11, color: "#94a3b8" }}>{filtered.length} of {scored.length} categories · {fmtRev(filtered.reduce((s,d) => s+d.revenue, 0))}</span>
        </div>
      )}

      {/* TABLE */}
      <div style={{ background: "#fff", borderRadius: 20, overflow: "hidden", border: "1px solid #e2e8f0", boxShadow: "0 2px 12px rgba(0,0,0,.04)", marginBottom: 20 }}>
        <div className="table-scroll">
        <table>
          <thead>
            <tr style={{ background: NAVY_ART }}>
              {[
                { label: "#", col: "rank", w: 44, align: "center" },
                { label: "Product", col: "name", align: "left" },
                { label: "Category", col: "category", align: "left" },
                { label: "Replaces", align: "left" },
                { label: "Price", align: "left" },
                { label: "Rev", col: "revenue", w: 65, align: "center" },
                { label: "💸", col: "priceResent", w: 52, align: "center", emoji: true },
                { label: "👥", col: "users", w: 52, align: "center", emoji: true },
                { label: "🔧", col: "replication", w: 52, align: "center", emoji: true },
                { label: "🔄", col: "switching", w: 52, align: "center", emoji: true },
                { label: "Score", col: "composite", w: 70, align: "center" },
              ].map(({ label, col, w, align, emoji }, i) => (
                <th key={i} onClick={() => col && handleSort(col)} style={{
                  padding: emoji ? "16px 8px" : "16px 12px",
                  color: sortCol === col ? "#fff" : (emoji ? "rgba(255,255,255,.9)" : "#ffd700"),
                  fontWeight: 700, textAlign: align, fontSize: emoji ? 15 : 13, letterSpacing: .3,
                  whiteSpace: "nowrap", cursor: col ? "pointer" : "default",
                  background: sortCol === col ? "rgba(255,215,0,.12)" : "transparent",
                  borderBottom: "1px solid rgba(255,255,255,.04)", width: w || undefined,
                }}>{label}{sortCol === col ? (sortDir === "desc" ? " ↓" : " ↑") : ""}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((d, idx) => {
              const tc = TC[d.tier];
              const isEx = expanded === d.name;
              return (
                <React.Fragment key={d.name}>
                  <tr onClick={() => setExpanded(isEx ? null : d.name)}
                    style={{ borderBottom: isEx ? "none" : "1px solid #f1f5f9", cursor: "pointer",
                      background: isEx ? "#fafbfe" : idx % 2 === 0 ? "#fff" : "#fafbfe", transition: "background .15s" }}>
                    <td style={{ padding: "12px 10px", textAlign: "center" }}>
                      <span style={{ color: tc, fontSize: 9, marginRight: 3, display: "inline-block", transform: isEx ? "rotate(90deg)" : "none", transition: "transform .15s" }}>▶</span>
                      <span style={{ fontWeight: 700, color: "#334155", fontSize: 13 }}>{d.rank}</span>
                    </td>
                    <td style={{ padding: "12px 10px", fontWeight: 700, color: "#111827", fontSize: 14, whiteSpace: "nowrap", letterSpacing: -.2 }}>{d.name}</td>
                    <td style={{ padding: "12px 10px", color: "#6b7280", fontSize: 12, fontWeight: 500 }}>{d.category}</td>
                    <td style={{ padding: "12px 10px", color: "#64748b", fontSize: 11, maxWidth: 220, lineHeight: 1.4 }}>{d.replaces}</td>
                    <td style={{ padding: "12px 10px", color: "#dc2626", fontSize: 12, whiteSpace: "nowrap", fontWeight: 600 }}>{d.price}</td>
                    <td style={{ padding: "12px 10px", textAlign: "center", fontWeight: 700, fontSize: 13, color: "#b8960a" }}>{fmtRev(d.revenue)}</td>
                    {[d.priceResent, d.users, d.replication, d.switching].map((v,i) => (
                      <td key={i} style={{ padding: "12px 4px" }}><ScoreBar val={v} /></td>
                    ))}
                    <td style={{ padding: "12px 10px", textAlign: "center" }}>
                      <span style={{ fontWeight: 900, fontSize: 18, color: tc, letterSpacing: -.5 }}>{d.composite}</span>
                    </td>
                  </tr>
                  {isEx && (
                    <tr style={{ background: "#fafbfe" }}>
                      <td colSpan={11} style={{ padding: 0 }}>
                        <div style={{ borderLeft: `3px solid ${TC_BRIGHT[d.tier]}`, padding: 24, margin: "0 10px 10px" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                            <div>
                              <span style={{ fontSize: 22, fontWeight: 800, color: "#111827" }}>{d.name}</span>
                              <span style={{ fontSize: 12, color: "#94a3b8", marginLeft: 10 }}>{d.category}</span>
                            </div>
                            <div style={{ textAlign: "right" }}>
                              <div style={{ fontSize: 36, fontWeight: 900, color: TC_BRIGHT[d.tier] }}>{d.composite}</div>
                              <div style={{ fontSize: 10, color: "#94a3b8", fontWeight: 600, letterSpacing: 1 }}>TIER {d.tier} · {d.switchTonight}</div>
                            </div>
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
                            {[{ label: "TAM", value: d.tam, color: "#111827" }, { label: "Their pricing", value: d.price, color: "#dc2626" }, { label: "Revenue displaced", value: fmtRev(d.revenue), color: "#b8960a" }].map(({ label, value, color }) => (
                              <div key={label} style={{ background: "#f1f5f9", borderRadius: 12, padding: "12px 16px" }}>
                                <div style={{ fontSize: 10, color: "#94a3b8", fontWeight: 600, letterSpacing: .5, marginBottom: 2 }}>{label}</div>
                                <div style={{ fontSize: 15, fontWeight: 700, color }}>{value}</div>
                              </div>
                            ))}
                          </div>
                          <div style={{ fontSize: 13, color: "#6b7280", fontStyle: "italic", marginBottom: 20, lineHeight: 1.6, background: "#f8fafc", borderRadius: 12, padding: "14px 18px", border: "1px solid #f1f5f9" }}>{d.note}</div>
                          <div style={{ marginBottom: 20 }}>
                            <div style={{ fontSize: 11, color: "#111827", fontWeight: 700, letterSpacing: .5, marginBottom: 10, textTransform: "uppercase" }}>Competitors We Replace ({d.competitors.length})</div>
                            <div style={{ borderRadius: 14, overflow: "hidden", border: "1px solid #e2e8f0" }}>
                              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                                <thead><tr style={{ background: "#f8fafc" }}>
                                  {["Company","Pricing","Est. Revenue","Users","Vulnerability"].map((h,i) => (
                                    <th key={i} style={{ padding: "10px 12px", fontSize: 10, color: "#94a3b8", letterSpacing: .5, textAlign: "left", fontWeight: 600, borderBottom: "1px solid #e2e8f0" }}>{h}</th>
                                  ))}
                                </tr></thead>
                                <tbody>
                                  {d.competitors.map((c, ci) => (
                                    <tr key={ci} style={{ borderBottom: "1px solid #f1f5f9" }}>
                                      <td style={{ padding: "10px 12px", fontSize: 12, whiteSpace: "nowrap" }}>
                                        <a href={c.url} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()}
                                          style={{ color: "#111827", fontWeight: 600, textDecoration: "none", borderBottom: "1px solid #e2e8f0" }}>{c.name} ↗</a>
                                      </td>
                                      <td style={{ padding: "10px 12px", fontSize: 11, color: "#dc2626", whiteSpace: "nowrap", fontWeight: 600 }}>{c.price}</td>
                                      <td style={{ padding: "10px 12px", fontSize: 11, color: "#b8960a", fontWeight: 700, whiteSpace: "nowrap" }}>{c.rev}</td>
                                      <td style={{ padding: "10px 12px", fontSize: 11, color: "#6b7280" }}>{c.users}</td>
                                      <td style={{ padding: "10px 12px", fontSize: 11, color: "#6b7280", lineHeight: 1.5 }}>{c.vulnerability}</td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
                            {WEIGHT_META.map(({ key, label, color }) => (
                              <div key={key} style={{ textAlign: "center", padding: 14, border: "1px solid #e2e8f0", borderRadius: 14, background: "#fff" }}>
                                <div style={{ fontSize: 10, color: "#94a3b8", fontWeight: 600, letterSpacing: .5, marginBottom: 6 }}>{label}</div>
                                <div style={{ fontSize: 28, fontWeight: 900, color }}>{d[key]}</div>
                                <div style={{ fontSize: 11, color: "#cbd5e1", marginTop: 2 }}>× {weights[key]}% = {tw > 0 ? ((d[key]*weights[key])/tw).toFixed(2) : "0"}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
            {filtered.length === 0 && <tr><td colSpan={11} style={{ padding: 40, textAlign: "center", color: "#94a3b8" }}>No categories match current filters</td></tr>}
          </tbody>
        </table>
        </div>
      </div>


      {/* FOOTER */}
      <footer className="footer-section" style={{ background: "linear-gradient(135deg,#0f1a3a 0%,#1a2a4a 40%,#243352 70%,#1e2d48 100%)", padding: "24px 16px", borderRadius: "24px 24px 0 0", marginTop: 0 }}>
        <div style={{ maxWidth: 600, margin: "0 auto 24px", background: "#d4d0c8", borderRadius: 12, overflow: "hidden", border: "1px solid rgba(255,255,255,.1)" }}>
          <div style={{ background: "#1a1e4a", padding: 8, textAlign: "center", fontSize: 10, color: "#ffd700", fontWeight: 700, letterSpacing: 1 }}>🌐 FREE SOFTWARE WEBRING 🌐</div>
          <div style={{ padding: 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 16, textAlign: "center" }}>
            <button style={{ background: "#d4d0c8", border: "2px solid", borderColor: "#fff #808080 #808080 #fff", padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "Inter,sans-serif" }}>« Prev</button>
            <div>
              <p style={{ fontSize: 12, color: "#000" }}>This site is part of the</p>
              <p style={{ color: "#0055ea", fontWeight: 700, textDecoration: "underline", fontSize: 13 }}>Free Software Alternatives WebRing</p>
              <p style={{ fontSize: 10, color: "#555" }}>[ 89 sites in ring ]</p>
            </div>
            <button style={{ background: "#d4d0c8", border: "2px solid", borderColor: "#fff #808080 #808080 #fff", padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "Inter,sans-serif" }}>Next »</button>
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 10, padding: "0 0 10px", fontSize: 11 }}>
            <a href="#" style={{ color: "#0055ea", textDecoration: "underline" }}>Random</a><span style={{ color: "#555" }}>|</span>
            <a href="#" style={{ color: "#0055ea", textDecoration: "underline" }}>List All Sites</a><span style={{ color: "#555" }}>|</span>
            <a href="#" style={{ color: "#0055ea", textDecoration: "underline" }}>Join This Ring</a>
          </div>
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: 8, marginBottom: 16 }}>
          <a href="index.html" style={{ fontSize: 11, color: "#c0c0c0", textDecoration: "underline" }}>Home</a><span style={{ color: "#c0c0c0" }}>|</span>
          <a href="#" style={{ fontSize: 11, color: "#c0c0c0", textDecoration: "underline" }}>About</a><span style={{ color: "#c0c0c0" }}>|</span>
          <a href="#" style={{ fontSize: 11, color: "#c0c0c0", textDecoration: "underline" }}>GitHub</a><span style={{ color: "#c0c0c0" }}>|</span>
          <a href="#" style={{ fontSize: 11, color: "#c0c0c0", textDecoration: "underline" }}>r/AppBuster</a><span style={{ color: "#c0c0c0" }}>|</span>
          <a href="#" style={{ fontSize: 11, color: "#c0c0c0", textDecoration: "underline" }}>Contact</a>
        </div>
        <div style={{ textAlign: "center" }}>
          <p style={{ fontSize: 10, color: "#c0c0c0" }}>We just think $249/mo for an SEO tool is insane. <span style={{ color: "#cc0000" }}>&lt;3</span></p>
          <p style={{ fontSize: 9, color: "rgba(192,192,192,.6)", marginTop: 4 }}><span style={{ fontFamily: "'Arial Black',Impact,sans-serif", color: "#ffd700", letterSpacing: 1, textShadow: "1px 1px 0 #b8960a" }}>APPBUSTER</span> - Est. 2026 - Built with AI, priced with common sense.</p>
          <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
            {["✅ 100% LEGAL", "✅ AI-BUILT", "✅ OPEN SOURCE", "✅ NO SPYWARE"].map(b => (
              <span key={b} style={{ background: "#d4d0c8", padding: "2px 8px", fontSize: 9, fontFamily: "'Courier Prime',monospace", border: "2px solid", borderColor: "#fff #808080 #808080 #fff" }}>{b}</span>
            ))}
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
