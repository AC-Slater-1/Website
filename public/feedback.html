<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin - Report an Issue</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }

:root {
  --bg: #09090b;
  --surface: #18181b;
  --surface-hover: #27272a;
  --border: #27272a;
  --border-focus: #3b82f6;
  --text: #fafafa;
  --muted: #a1a1aa;
  --gold: #ffd700;
  --gold-dim: rgba(255,215,0,0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.15);
  --success: #22c55e;
  --success-dim: rgba(34,197,94,0.12);
  --danger: #ef4444;
  --danger-dim: rgba(239,68,68,0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --mono: 'JetBrains Mono', 'Courier New', monospace;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --transition: 150ms cubic-bezier(.4,0,.2,1);
}

html {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 60px;
}

/* ── Header ── */
.header {
  text-align: center;
  margin-bottom: 32px;
}
.header h1 {
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  margin-bottom: 4px;
}
.header h1 span { color: var(--gold); }
.header p {
  color: var(--muted);
  font-size: 0.95rem;
}

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: 100%;
  max-width: 560px;
}

/* ── Form fields ── */
.field { margin-bottom: 20px; }
.field:last-child { margin-bottom: 0; }

label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

input[type="text"],
input[type="url"],
textarea,
select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--sans);
  font-size: 0.95rem;
  padding: 10px 14px;
  transition: border-color var(--transition);
  outline: none;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}
textarea { resize: vertical; min-height: 100px; }
select { cursor: pointer; }
select option { background: var(--surface); color: var(--text); }

/* ── Upload Zone ── */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.upload-zone:hover,
.upload-zone.dragover {
  border-color: var(--blue);
  background: var(--blue-dim);
}
.upload-zone.has-image {
  padding: 0;
  border-style: solid;
  border-color: var(--border);
}
.upload-zone .upload-prompt {
  pointer-events: none;
}
.upload-zone .upload-icon {
  font-size: 2rem;
  margin-bottom: 8px;
  display: block;
}
.upload-zone .upload-text {
  color: var(--muted);
  font-size: 0.9rem;
}
.upload-zone .upload-text strong {
  color: var(--blue);
}
.upload-zone .upload-hint {
  color: var(--muted);
  font-size: 0.75rem;
  margin-top: 6px;
  opacity: 0.7;
}
.upload-zone img {
  display: block;
  width: 100%;
  max-height: 300px;
  object-fit: contain;
  background: #000;
  border-radius: calc(var(--radius) - 2px);
}
.upload-zone .remove-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  font-size: 16px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
  z-index: 2;
}
.upload-zone.has-image .remove-btn { display: flex; }
.upload-zone.has-image .upload-prompt { display: none; }

input[type="file"] { display: none; }

/* ── Category Pills ── */
.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: var(--bg);
  color: var(--muted);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
}
.pill:hover {
  border-color: var(--muted);
  color: var(--text);
}
.pill.active {
  border-color: var(--gold);
  background: var(--gold-dim);
  color: var(--gold);
}
.pill input { display: none; }

/* ── Submit ── */
.submit-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  background: var(--gold);
  color: #000;
  font-family: var(--sans);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: -0.01em;
}
.submit-btn:hover { background: #ffe44d; transform: translateY(-1px); }
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 24px;
  font-size: 0.9rem;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  z-index: 9999;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }

/* ── Error state ── */
.field-error input,
.field-error textarea,
.field-error select {
  border-color: var(--danger);
}
.error-msg {
  color: var(--danger);
  font-size: 0.78rem;
  margin-top: 4px;
  display: none;
}
.field-error .error-msg { display: block; }

/* ── Footer ── */
.footer {
  margin-top: 32px;
  color: var(--muted);
  font-size: 0.8rem;
  opacity: 0.5;
}

/* ── Responsive ── */
@media (max-width: 600px) {
  body { padding: 24px 16px 40px; }
  .card { padding: 24px 20px; }
  .header h1 { font-size: 1.7rem; }
  .pills { gap: 6px; }
  .pill { padding: 6px 12px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>Kevin</span></h1>
  <p>Screenshot it. Describe it. Done.</p>
</div>

<div class="card">
  <form id="feedbackForm" novalidate>

    <!-- Screenshot Upload -->
    <div class="field">
      <label>Screenshot</label>
      <div class="upload-zone" id="uploadZone">
        <div class="upload-prompt">
          <span class="upload-icon">📸</span>
          <div class="upload-text"><strong>Click to upload</strong> or drag & drop</div>
          <div class="upload-hint">PNG, JPG, or WebP &middot; Max 5 MB</div>
        </div>
        <img id="preview" alt="Screenshot preview" style="display:none">
        <button type="button" class="remove-btn" id="removeBtn">&times;</button>
      </div>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">
    </div>

    <!-- Category -->
    <div class="field" id="categoryField">
      <label>Category</label>
      <div class="pills" id="categoryPills">
        <label class="pill" data-value="bug">
          <input type="radio" name="category" value="bug"> 🐛 Bug
        </label>
        <label class="pill" data-value="cosmetic">
          <input type="radio" name="category" value="cosmetic"> 🎨 Cosmetic
        </label>
        <label class="pill" data-value="mobile">
          <input type="radio" name="category" value="mobile"> 📱 Mobile
        </label>
        <label class="pill" data-value="copy">
          <input type="radio" name="category" value="copy"> 💬 Copy/Text
        </label>
        <label class="pill" data-value="suggestion">
          <input type="radio" name="category" value="suggestion"> 💡 Suggestion
        </label>
      </div>
      <div class="error-msg">Pick a category</div>
    </div>

    <!-- Brand -->
    <div class="field">
      <label>Brand</label>
      <select id="brandSelect">
        <option value="">Homepage / General</option>
        <option value="appbusters">App Busters</option>
        <option value="saasbuster">SaaS Buster</option>
        <option value="samebutfree">Same But Free</option>
        <option value="sassbuster">Sass Buster</option>
        <option value="limeware">Limeware</option>
        <option value="iseeq">iSeeQ</option>
        <option value="modelt">Model T</option>
        <option value="nocatch">No Catch</option>
        <option value="plainlabel">Plain Label</option>
        <option value="vanillalabs">Vanilla Labs</option>
        <option value="compareto">CompareTo</option>
        <option value="16kb">16KB</option>
      </select>
    </div>

    <!-- Page URL -->
    <div class="field">
      <label>Page URL <span style="opacity:0.5;text-transform:none;font-weight:400">(optional)</span></label>
      <input type="url" id="pageUrl" placeholder="https://website-six-bice-65.vercel.app/saasbuster/crm.html">
    </div>

    <!-- Description -->
    <div class="field" id="descriptionField">
      <label>What's wrong?</label>
      <textarea id="description" placeholder="Describe what you see vs. what you expected..." rows="4"></textarea>
      <div class="error-msg">Please describe the issue</div>
    </div>

    <!-- Name -->
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="reporterName" placeholder="Who's reporting?">
    </div>

    <div class="field">
      <button type="submit" class="submit-btn" id="submitBtn">Send to Kevin 📮</button>
    </div>

  </form>
</div>

<div class="footer">Kevin v1 &middot; Internal partner feedback</div>
<div class="toast" id="toast"></div>

<script>
(function() {
  var form = document.getElementById('feedbackForm');
  var uploadZone = document.getElementById('uploadZone');
  var fileInput = document.getElementById('fileInput');
  var preview = document.getElementById('preview');
  var removeBtn = document.getElementById('removeBtn');
  var submitBtn = document.getElementById('submitBtn');
  var toast = document.getElementById('toast');
  var selectedFile = null;

  // ── Restore saved name ──
  var nameInput = document.getElementById('reporterName');
  var savedName = localStorage.getItem('kevin_reporter_name');
  if (savedName) nameInput.value = savedName;

  // ── Category pills ──
  var pills = document.querySelectorAll('.pill');
  pills.forEach(function(pill) {
    pill.addEventListener('click', function() {
      pills.forEach(function(p) { p.classList.remove('active'); });
      pill.classList.add('active');
      pill.querySelector('input').checked = true;
      document.getElementById('categoryField').classList.remove('field-error');
    });
  });

  // ── Upload zone ──
  uploadZone.addEventListener('click', function(e) {
    if (e.target === removeBtn || e.target.closest('.remove-btn')) return;
    fileInput.click();
  });

  uploadZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    uploadZone.classList.add('dragover');
  });
  uploadZone.addEventListener('dragleave', function() {
    uploadZone.classList.remove('dragover');
  });
  uploadZone.addEventListener('drop', function(e) {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    var files = e.dataTransfer.files;
    if (files.length > 0) handleFile(files[0]);
  });

  fileInput.addEventListener('change', function() {
    if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
  });

  removeBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    selectedFile = null;
    preview.src = '';
    preview.style.display = 'none';
    uploadZone.classList.remove('has-image');
    fileInput.value = '';
  });

  function handleFile(file) {
    // Validate type
    var validTypes = ['image/png', 'image/jpeg', 'image/webp'];
    if (validTypes.indexOf(file.type) === -1) {
      showToast('Only PNG, JPG, or WebP files', 'error');
      return;
    }
    // Validate size (5MB)
    if (file.size > 5 * 1024 * 1024) {
      showToast('File must be under 5 MB', 'error');
      return;
    }
    selectedFile = file;
    var reader = new FileReader();
    reader.onload = function(e) {
      preview.src = e.target.result;
      preview.style.display = 'block';
      uploadZone.classList.add('has-image');
    };
    reader.readAsDataURL(file);
  }

  // ── Submit ──
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var valid = true;

    // Validate category
    var category = form.querySelector('input[name="category"]:checked');
    if (!category) {
      document.getElementById('categoryField').classList.add('field-error');
      valid = false;
    }

    // Validate description
    var desc = document.getElementById('description').value.trim();
    if (!desc) {
      document.getElementById('descriptionField').classList.add('field-error');
      valid = false;
    } else {
      document.getElementById('descriptionField').classList.remove('field-error');
    }

    if (!valid) return;

    // Save name
    var name = nameInput.value.trim();
    if (name) localStorage.setItem('kevin_reporter_name', name);

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';

    var formData = new FormData();
    if (selectedFile) formData.append('screenshot', selectedFile);
    formData.append('category', category.value);
    formData.append('brand', document.getElementById('brandSelect').value);
    formData.append('page_url', document.getElementById('pageUrl').value.trim());
    formData.append('description', desc);
    formData.append('reporter_name', name);

    fetch('/api/feedback', {
      method: 'POST',
      body: formData
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        showToast('Thanks! Kevin got it. 🎉', 'success');
        resetForm();
      } else {
        showToast(data.error || 'Something went wrong', 'error');
      }
    })
    .catch(function(err) {
      showToast('Network error — try again', 'error');
    })
    .finally(function() {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send to Kevin 📮';
    });
  });

  function resetForm() {
    selectedFile = null;
    preview.src = '';
    preview.style.display = 'none';
    uploadZone.classList.remove('has-image');
    fileInput.value = '';
    pills.forEach(function(p) { p.classList.remove('active'); });
    form.querySelectorAll('input[name="category"]').forEach(function(r) { r.checked = false; });
    document.getElementById('brandSelect').value = '';
    document.getElementById('pageUrl').value = '';
    document.getElementById('description').value = '';
    // Keep name — it's saved
  }

  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(function() {
      toast.classList.remove('show');
    }, 3500);
  }
})();
</script>

</body>
</html>
